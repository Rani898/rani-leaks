<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0a0a0a"/>
    <stop offset="50%" style="stop-color:#1a0510"/>
    <stop offset="100%" style="stop-color:#000"/>
  </linearGradient>
  <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#E50914"/>
    <stop offset="100%" style="stop-color:#B20710"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="8"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<!-- Decorative shapes -->
<circle cx="150" cy="120" r="80" fill="#E50914" opacity="0.08"/>
<circle cx="1050" cy="500" r="120" fill="#E50914" opacity="0.06"/>
<circle cx="950" cy="100" r="40" fill="#E50914" opacity="0.1"/>
<!-- Logo R -->
<g transform="translate(540,180)">
  <rect x="0" y="0" width="120" height="120" rx="26" fill="#0b0b0b" stroke="url(#red)" stroke-width="4"/>
  <text x="60" y="92" font-family="Arial Black,sans-serif" font-size="80" font-weight="900" font-style="italic" fill="url(#red)" text-anchor="middle" filter="url(#glow)">R</text>
  <circle cx="95" cy="25" r="6" fill="#E50914"/>
</g>
<!-- Title -->
<text x="600" y="380" font-family="Heebo,Arial,sans-serif" font-size="76" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="2">RANI LEAKS</text>
<!-- Tagline -->
<text x="600" y="430" font-family="Heebo,Arial,sans-serif" font-size="28" font-weight="600" fill="#E50914" text-anchor="middle">האתר הכי טוב בארץ 🔥</text>
<!-- Features -->
<text x="600" y="500" font-family="Heebo,Arial,sans-serif" font-size="22" font-weight="500" fill="#aaa" text-anchor="middle">🎬 סטרימינג • ⚽ כדורגל LIVE • 🔐 הצפנה • 🏗️ בונה אתרים</text>
<!-- URL -->
<text x="600" y="580" font-family="Arial,sans-serif" font-size="18" font-weight="600" fill="#666" text-anchor="middle">rani898.github.io/rani-leaks</text>
</svg>
